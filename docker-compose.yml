# ============================================================
# DOCKER COMPOSE — Programa Ser Livre
# Instituto Dra. Mariana Wogel
#
# Este arquivo orquestra 3 serviços:
# 1. postgres  → Banco de dados (onde ficam os dados)
# 2. backend   → API do sistema (a "lógica" do programa)
# 3. frontend  → Interface visual (o que aparece na tela)
# ============================================================

version: "3.8"

services:
  # ──────────────────────────────────────────────
  # BANCO DE DADOS — PostgreSQL
  # É onde ficam todos os dados: pacientes, scores,
  # checklist, equipe, etc. Pense nele como o
  # "arquivo" do consultório, mas digital.
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: serlivre
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SenhaForte123!}
      POSTGRES_DB: serlivre
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serlivre"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # BACKEND — API Node.js
  # É o "cérebro" do sistema. Recebe pedidos do
  # frontend, processa (calcula scores, busca
  # dados) e devolve as respostas.
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://serlivre:${DB_PASSWORD:-SenhaForte123!}@postgres:5432/serlivre
      JWT_SECRET: ${JWT_SECRET:-trocar-por-chave-segura-em-producao}
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # FRONTEND — React + Nginx
  # É a parte visual: as telas, botões, gráficos.
  # O Nginx serve os arquivos estáticos e redireciona
  # as chamadas de API para o backend.
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

# Volume persistente para o banco de dados
# (os dados não se perdem quando reinicia o container)
volumes:
  pgdata:
