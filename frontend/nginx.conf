# ============================================================
# CONFIGURAÇÃO DO NGINX
# 
# O Nginx faz duas coisas:
# 1. Serve os arquivos do React (HTML, CSS, JS)
# 2. Redireciona chamadas /api/* para o backend (porta 3001)
#
# Isso significa que tudo roda no mesmo domínio,
# sem problemas de CORS ou portas diferentes.
# ============================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Arquivos estáticos do React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso: /api/* vai para o backend
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploads (fotos de perfil)
    location /uploads/ {
        proxy_pass http://backend:3001;
    }
}
