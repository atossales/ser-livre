# ============================================================
# CONFIGURAÇÃO DO NGINX
#
# O Nginx faz duas coisas:
# 1. Serve os arquivos do React (HTML, CSS, JS)
# 2. Redireciona chamadas /api/* para o backend (porta 3001)
#
# Isso significa que tudo roda no mesmo domínio,
# sem problemas de CORS ou portas diferentes.
# ============================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Headers de Segurança ────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' data: blob: https://kajebqadlpxufqdhchxy.supabase.co wss://kajebqadlpxufqdhchxy.supabase.co https://*.easypanel.host https://*.dramarianawogel.com.br; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Arquivos estáticos do React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso: /api/* vai para o backend
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploads (fotos de perfil)
    location /uploads/ {
        proxy_pass http://backend:3001;
    }
}
